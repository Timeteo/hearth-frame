<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>hearth-frame</title>
<style>
  html,body { margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#0a0b0e; font-family:Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; cursor:none; }

  .slide { position:absolute; inset:0; opacity:0; transition:opacity 1.4s ease; }
  .slide.on { opacity:1; }
  .slide img { position:absolute; top:0; height:100%; object-fit:cover; background:#0a0b0e; }
  .slide.full img { left:0; width:100%; }
  .slide.pair img.l { left:0; width:calc(50% - 1px); }
  .slide.pair img.r { left:calc(50% + 1px); width:calc(50% - 1px); }
  /* lone portrait fallback: centered, dark gutters */
  .slide.solo img { left:50%; transform:translateX(-50%); width:auto; max-width:100%; }

  .scrim-b { position:absolute; left:0; right:0; bottom:0; height:28vh; pointer-events:none;
    background:linear-gradient(180deg, rgba(10,11,14,0) 0%, rgba(10,11,14,.55) 70%, rgba(10,11,14,.72) 100%); }
  .scrim-t { position:absolute; left:0; right:0; top:0; height:14vh; pointer-events:none;
    background:linear-gradient(0deg, rgba(10,11,14,0) 0%, rgba(10,11,14,.45) 100%); }

  #clock { position:absolute; left:48px; bottom:40px; color:rgba(255,255,255,.97);
    text-shadow:0 1px 12px rgba(0,0,0,.45); }
  #clock .t { font-size:88px; font-weight:300; line-height:1; letter-spacing:-1px; }
  #clock .t .ap { font-size:26px; font-weight:500; color:#FFB27A; margin-left:8px; letter-spacing:.06em; }
  #clock .w { margin-top:10px; font-size:21px; font-weight:400; color:rgba(255,255,255,.85); min-height:25px; }
  #clock .w .deg { font-weight:500; }
  #clock .w .dot { color:#FFB27A; margin:0 8px; }
  #clock .w .hl { color:rgba(255,255,255,.55); }

  .meta { position:absolute; bottom:46px; text-align:right; color:rgba(255,255,255,.85);
    text-shadow:0 1px 10px rgba(0,0,0,.5); display:none; }
  .meta .loc { font-size:20px; font-weight:400; }
  .meta .loc .pin { color:#FFB27A; margin-right:6px; font-size:17px; }
  .meta .date { margin-top:6px; font-size:15px; font-weight:400; letter-spacing:.05em;
    color:rgba(255,255,255,.55); }
  .meta .date .ago { color:#FFB27A; }
  #metaR { right:48px; }
  #metaL { right:calc(50% + 25px); }
  #metaL .loc, #metaL .date { font-size:18px; }
  #metaL .date { font-size:14px; }
  .meta.pairhalf .loc { font-size:18px; }
  .meta.pairhalf .date { font-size:14px; }
</style>
</head>
<body>
  <div id="sA" class="slide"></div>
  <div id="sB" class="slide"></div>
  <div class="scrim-t"></div>
  <div class="scrim-b"></div>
  <div id="clock">
    <div class="t"><span id="tt"></span><span class="ap" id="ap"></span></div>
    <div class="w" id="wline"></div>
  </div>
  <div class="meta" id="metaL"></div>
  <div class="meta" id="metaR"></div>

<script>
(() => {
  const CFG = {
    manifest: "frame/manifest.json",
    // Published by the "Portal Frame - Publish Weather" HA automation;
    // the frame server proxies it same-origin at frame/weather.json.
    // No tokens: only non-sensitive weather data is fetched.
    weather_json: "frame/weather.json",
    dwell_ms: 10000,
    fade_ms: 1400,
    weather_refresh_ms: 15 * 60 * 1000,
    manifest_refresh_ms: 6 * 60 * 60 * 1000,
    // Anniversary mix: photos taken within ±window days of today's calendar
    // date (any year) get anniv_share of slots. Share scales down linearly
    // when the pool is smaller than anniv_min_pool so a thin window doesn't
    // repeat the same few photos all evening.
    anniv_share: 0.3,
    anniv_window_days: 14,
    anniv_min_pool: 12,
    anniv_per_date_cap: 6,     // max photos per exact capture date per cycle
  };
  // URL overrides, e.g. ?anniv=30&window=14&dwell=10 (regex, not
  // URLSearchParams — the Portal WebView is old)
  {
    const q = k => (location.search.match(new RegExp("[?&]" + k + "=(\\d+)")) || [])[1];
    if (q("anniv") != null) CFG.anniv_share = +q("anniv") / 100;
    if (q("window")) CFG.anniv_window_days = +q("window");
    if (q("dwell")) CFG.dwell_ms = +q("dwell") * 1000;
  }

  const $ = id => document.getElementById(id);

  /* ---------- clock ---------- */
  function tick() {
    const d = new Date();
    let h = d.getHours(); const ap = h >= 12 ? "PM" : "AM";
    $("tt").textContent = (h % 12 || 12) + ":" + String(d.getMinutes()).padStart(2, "0");
    $("ap").textContent = ap;
  }
  setInterval(tick, 1000); tick();

  /* ---------- weather ---------- */
  const COND = {
    "clear-night": "Clear", cloudy: "Cloudy", fog: "Fog", hail: "Hail",
    lightning: "Storm", "lightning-rainy": "Thunderstorms", partlycloudy: "Partly Cloudy",
    pouring: "Pouring", rainy: "Rain", snowy: "Snow", "snowy-rainy": "Wintry Mix",
    sunny: "Sunny", windy: "Windy", "windy-variant": "Windy", exceptional: "Alert",
  };
  function refreshWeather() {
    const el = $("wline");
    fetch(CFG.weather_json + "?t=" + Date.now())
      .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(w => {
        if ((Date.now() / 1000) - (w.ts || 0) > 2 * 3600) throw new Error("stale");
        const cond = COND[w.cond] || w.cond;
        const hl = (w.hi != null && w.lo != null)
          ? `<span class="dot">·</span><span class="hl">H ${w.hi}° · L ${w.lo}°</span>` : "";
        el.innerHTML = `<span class="deg">${w.t}°</span> ${cond}${hl}`;
      })
      .catch(() => { el.innerHTML = ""; });
  }
  setInterval(refreshWeather, CFG.weather_refresh_ms); refreshWeather();

  /* ---------- photo deck ---------- */
  let deck = [];        // shuffled photo entries not yet shown
  let annivDeck = [];   // shuffled "taken around this date, past years" entries
  let annivDay = "";    // date the anniversary pool was built for
  let all = [];         // full manifest
  const esc = s => String(s).replace(/[&<>"']/g,
    c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function loadManifest() {
    return fetch(CFG.manifest + "?t=" + Date.now())
      .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(m => { all = m.photos || m; annivDay = ""; })  // force anniv-pool rebuild
      .catch(() => {});
  }
  setInterval(loadManifest, CFG.manifest_refresh_ms);

  const isPortrait = p => (p.h || 0) > (p.w || 0);

  /* ---------- anniversary pool ---------- */
  // date-only strings must not go through Date() — it parses them as UTC
  const parseD = iso => { const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso || ""); return m && { y: +m[1], mo: +m[2], da: +m[3] }; };
  function annivDelta(p, now) {        // min |days| between photo's calendar date and today, wrapping year-end
    const d = parseD(p.d);
    if (!d) return null;
    let best = Infinity;
    for (let y = now.getFullYear() - 1; y <= now.getFullYear() + 1; y++)
      best = Math.min(best, Math.abs((new Date(y, d.mo - 1, d.da) - now) / 86400000));
    return best;
  }
  function yearsAgo(p, now) {
    const d = parseD(p.d);
    if (!d) return 0;
    // nearest anniversary's year decides the count (Dec photos shown in early Jan count the extra year)
    return Math.round((now - new Date(d.y, d.mo - 1, d.da)) / (365.25 * 86400000));
  }
  function buildAnnivPool() {
    const now = new Date(); now.setHours(0, 0, 0, 0);
    annivDay = now.toDateString();
    const byDate = {};
    for (const p of all) {
      const dt = annivDelta(p, now);
      if (dt == null || dt > CFG.anniv_window_days) continue;
      if (yearsAgo(p, now) < 1) continue;          // this year's photos aren't anniversaries
      (byDate[p.d] = byDate[p.d] || []).push(p);
    }
    const pool = [];
    for (const k in byDate) {                       // clump control: cap per capture date
      const g = shuffle(byDate[k]);
      pool.push(...g.slice(0, CFG.anniv_per_date_cap));
    }
    annivDeck = shuffle(pool);
    annivPoolSize = pool.length;
    return pool.length;
  }
  let annivPoolSize = 0;
  function annivShareNow() {                        // rebuilds pool on day change / manifest refresh
    if (new Date().toDateString() !== annivDay) buildAnnivPool();
    if (!annivPoolSize) return 0;                   // nothing near this date — pure uniform mode
    if (!annivDeck.length) buildAnnivPool();        // cycled through: reshuffle for the rest of the day
    return CFG.anniv_share * Math.min(1, annivDeck.length / CFG.anniv_min_pool);
  }
  function takeAnniv(wantPortrait) {                // draw from anniv deck, keep main deck consistent
    const i = wantPortrait == null ? 0 : annivDeck.findIndex(p => isPortrait(p) === wantPortrait);
    if (i < 0) return null;
    const p = annivDeck.splice(i, 1)[0];
    const j = deck.indexOf(p);
    if (j >= 0) deck.splice(j, 1);
    return p;
  }

  function draw() {                    // next 1-2 photos forming one slide
    if (!deck.length) deck = shuffle(all.slice());
    if (!deck.length) return null;
    const fromAnniv = Math.random() < annivShareNow();
    const first = fromAnniv ? (takeAnniv(null) || deck.shift()) : deck.shift();
    if (!isPortrait(first)) return { kind: "full", ph: [first] };
    // portrait partner: themed pair from the anniv deck when leading with one
    const partner = (fromAnniv && takeAnniv(true)) ||
      (j => j >= 0 ? deck.splice(j, 1)[0] : null)(deck.findIndex(isPortrait));
    if (partner) return { kind: "pair", ph: [first, partner] };
    return { kind: "solo", ph: [first] };
  }

  const MON = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY",
    "AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];
  function fmtDate(iso) {
    // date-only strings must not go through Date() — it parses them as UTC
    const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso || "");
    if (!m) return "";
    return `${MON[+m[2] - 1]} ${+m[3]}, ${m[1]}`;
  }
  function metaHtml(p) {
    const loc = p.loc ? `<div class="loc"><span class="pin">◆</span>${esc(p.loc)}</div>` : "";
    let date = fmtDate(p.d);
    if (date) {
      const now = new Date(); now.setHours(0, 0, 0, 0);
      const dt = annivDelta(p, now), yrs = yearsAgo(p, now);
      if (dt != null && dt <= CFG.anniv_window_days && yrs >= 1)
        date += ` <span class="ago">· ${yrs} ${yrs === 1 ? "YEAR" : "YEARS"} AGO</span>`;
    }
    return loc || date ? `${loc}<div class="date">${date}</div>` : "";
  }
  const src = p => p.f.match(/^https?:/) ? p.f : "frame/" + p.f;

  function preload(urls) {
    return Promise.all(urls.map(u => new Promise(res => {
      const im = new Image();
      im.onload = () => res(true); im.onerror = () => res(false);
      im.src = u;
    })));
  }

  let front = $("sA"), back = $("sB");
  function advance() {
    const s = draw();
    if (!s) { setTimeout(advance, 30000); loadManifest(); return; }
    const urls = s.ph.map(src);
    preload(urls).then(ok => {
      if (ok.some(x => !x)) { advance(); return; }   // skip broken files
      back.className = "slide " + s.kind;
      back.innerHTML = s.kind === "pair"
        ? `<img class="l" src="${esc(urls[0])}"><img class="r" src="${esc(urls[1])}">`
        : `<img src="${esc(urls[0])}">`;
      back.classList.add("on"); front.classList.remove("on");
      [front, back] = [back, front];
      const mL = $("metaL"), mR = $("metaR");
      if (s.kind === "pair") {
        mL.innerHTML = metaHtml(s.ph[0]); mL.className = "meta pairhalf";
        mR.innerHTML = metaHtml(s.ph[1]); mR.className = "meta pairhalf";
        mL.style.display = mL.innerHTML ? "block" : "none";
        mR.style.display = mR.innerHTML ? "block" : "none";
      } else {
        mL.style.display = "none";
        mR.innerHTML = metaHtml(s.ph[0]); mR.className = "meta";
        mR.style.display = mR.innerHTML ? "block" : "none";
      }
      setTimeout(advance, CFG.dwell_ms);
    });
  }
  loadManifest().then(advance);
})();
</script>
</body>
</html>
